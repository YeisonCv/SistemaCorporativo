<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCI ERP | Sistema Corporativo Integral</title>
    <meta name="description" content="SCI ERP — Plataforma empresarial de gestión integral cloud-native.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Single unified stylesheet -->
    <link rel="stylesheet" href="css/style.css">

    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <!-- External SDKs -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- App Container -->
    <div id="app" style="display: none;">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <i data-lucide="layers"></i>
                <h1>SCI ERP</h1>
            </div>

            <nav class="menu" style="flex:1; overflow-y:auto;">
                <a href="#/dashboard" class="menu-item" data-page="dashboard">
                    <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
                </a>
                <div class="sidebar-divider"></div>
                <a href="#/existencias" class="menu-item" data-page="existencias" data-role="admin,inventario">
                    <i data-lucide="package"></i><span>Inventarios</span>
                </a>
                <a href="#/movimientos" class="menu-item" data-page="movimientos" data-role="admin,inventario">
                    <i data-lucide="arrow-left-right"></i><span>Kardex</span>
                </a>
                <div class="sidebar-divider"></div>
                <a href="#/ventas" class="menu-item" data-page="ventas" data-role="admin,ventas">
                    <i data-lucide="shopping-cart"></i><span>Ventas / POS</span>
                </a>
                <a href="#/clientes" class="menu-item" data-page="clientes" data-role="admin,ventas">
                    <i data-lucide="users-2"></i><span>Directorio Clientes</span>
                </a>
                <div class="sidebar-divider"></div>
                <a href="#/compras" class="menu-item" data-page="compras" data-role="admin,inventario,ventas">
                    <i data-lucide="truck"></i><span>Compras</span>
                </a>
                <a href="#/proveedores" class="menu-item" data-page="proveedores" data-role="admin,inventario,ventas">
                    <i data-lucide="building-2"></i><span>Proveedores</span>
                </a>
                <div class="sidebar-divider"></div>
                <a href="#/rrhh" class="menu-item" data-page="rrhh" data-role="admin,rrhh">
                    <i data-lucide="users"></i><span>Talento Humano</span>
                </a>
                <a href="#/nomina" class="menu-item" data-page="nomina" data-role="admin,rrhh">
                    <i data-lucide="calculator"></i><span>Nómina</span>
                </a>
                <a href="#/social" class="menu-item" data-page="social" data-role="admin,rrhh">
                    <i data-lucide="shield-check"></i><span>Seg. Social</span>
                </a>
                <a href="#/novedades" class="menu-item" data-page="novedades" data-role="admin,rrhh">
                    <i data-lucide="alert-circle"></i><span>Novedades</span>
                </a>
                <div class="sidebar-divider"></div>
                <a href="#/reportes" class="menu-item" data-page="reportes" data-role="admin">
                    <i data-lucide="bar-chart-2"></i><span>BI & Analítica</span>
                </a>
                <a href="#/configuracion" class="menu-item" data-page="configuracion" data-role="admin">
                    <i data-lucide="settings"></i><span>Sistema</span>
                </a>
                <a href="#/logout" class="menu-item" id="logout-btn">
                    <i data-lucide="log-out"></i><span>Cerrar Sesión</span>
                </a>
            </nav>

            <div class="user-profile" onclick="window.location.hash='#/perfil'" style="cursor:pointer;">
                <div class="user-avatar" id="sidebar-avatar">O</div>
                <div class="user-info">
                    <div class="name" id="user-name">Operador</div>
                    <div class="role" id="user-role-nav">Personal</div>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-content">
            <header class="top-nav">
                <h2 id="page-title">DASHBOARD</h2>
                <div style="display:flex; gap:1rem; align-items:center;">
                    <button id="theme-toggle" class="theme-toggle-btn" title="Cambiar Tema">
                        <i data-lucide="sun" class="icon-sun"></i>
                        <i data-lucide="moon" class="icon-moon"></i>
                    </button>
                    <!-- other topnav elements if any -->
                </div>
            </header>
            <div id="view-content"></div>
        </main>
    </div>

    <!-- Login Container -->
    <div id="login-container"></div>

    <!-- Toast -->
    <div id="toast-container"></div>

    <!-- Scripts (order matters) -->
    <script src="js/supabase.js"></script>
    <script src="js/store.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/sales.js"></script>
    <script src="js/purchases.js"></script>
    <script src="js/suppliers.js"></script>
    <script src="js/clients.js"></script>
    <script src="js/payroll.js"></script>
    <script src="js/hr.js"></script>
    <script src="js/social_security.js"></script>
    <script src="js/absences.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/system.js"></script>
    <script src="js/profile_view.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
